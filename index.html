<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayGlobal7 - Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
        }
        
        header {
            background-color: #1a1a1a;
            color: white;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        
        .iframe-container {
            width: 100%;
            height: calc(100vh - 60px);
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .note {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0,0,0,0.85);
            color: #ffcc00;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <header>
        <h2>PlayGlobal7 - Login</h2>
    </header>
    
    <div class="iframe-container">
        <iframe 
            src="https://playglobal7.com/it/login/signin" 
            title="PlayGlobal7 Login"
            allowfullscreen>
        </iframe>
    </div>
    
    <div class="note">
        ⚠️ Molti siti di login/gaming bloccano il caricamento in iframe per motivi di sicurezza.
    </div>

    <script>
        // Avviso se l'iframe non carica
        window.addEventListener('load', function() {
            const iframe = document.querySelector('iframe');
            setTimeout(() => {
                try {
                    iframe.contentWindow;
                } catch(e) {
                    console.log("Il sito ha bloccato il caricamento in iframe.");
                }
            }, 2500);
        });
    </script>
</body>
</html>
