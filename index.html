<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon.it - iframe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        header {
            background-color: #232f3e;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }
        
        .iframe-container {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .note {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Amazon.it</h1>
    </header>
    
    <div class="iframe-container">
        <iframe 
            src="https://www.amazon.it/ref=nav_logo" 
            title="Amazon Italia"
            allowfullscreen>
        </iframe>
    </div>
    
    <div class="note">
        ⚠️ Alcuni siti (come Amazon) potrebbero impedire il caricamento in iframe per motivi di sicurezza.
    </div>

    <script>
        // Messaggio di fallback se l'iframe non carica
        window.addEventListener('load', function() {
            const iframe = document.querySelector('iframe');
            iframe.onerror = function() {
                alert("Amazon potrebbe bloccare il caricamento in iframe.\nProva ad aprire il link direttamente.");
            };
        });
    </script>
</body>
</html>
