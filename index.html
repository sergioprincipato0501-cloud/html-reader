<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Previewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f4f4f4;
        }
        .container {
            display: flex;
            gap: 15px;
            height: 90vh;
        }
        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .preview {
            flex: 1;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            overflow: auto;
        }
        textarea {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: none;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            background-color: #0056b3;
        }
        h2 {
            margin: 0 0 10px 0;
        }
    </style>
</head>
<body>

    <h1>HTML Live Preview</h1>
    
    <div class="container">
        <!-- Editor -->
        <div class="editor">
            <h2>Inserisci il tuo codice HTML qui:</h2>
            <textarea id="htmlInput" placeholder="Scrivi o incolla il tuo codice HTML qui..."></textarea>
            <button onclick="eseguiCodice()">▶ Esegui Codice</button>
        </div>

        <!-- Preview -->
        <div class="preview">
            <h2>Anteprima:</h2>
            <div id="previewArea"></div>
        </div>
    </div>

    <script>
        function eseguiCodice() {
            const input = document.getElementById('htmlInput').value;
            const preview = document.getElementById('previewArea');
            
            // Pulisce e renderizza il codice
            preview.innerHTML = input;
        }

        // Bonus: Esegui automaticamente quando premi Ctrl + Enter
        document.getElementById('htmlInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                eseguiCodice();
            }
        });
    </script>

</body>
</html>
