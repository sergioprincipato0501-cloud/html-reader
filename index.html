<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube - iframe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
        }
        
        header {
            background-color: #0f0f0f;
            color: white;
            padding: 12px 20px;
            text-align: center;
            border-bottom: 1px solid #303030;
        }
        
        .iframe-container {
            width: 100%;
            height: calc(100vh - 56px);
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .note {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <header>
        <h2>YouTube</h2>
    </header>
    
    <div class="iframe-container">
        <iframe 
            src="https://www.youtube.com" 
            title="YouTube"
            allowfullscreen>
        </iframe>
    </div>
    
    <div class="note">
        ⚠️ YouTube potrebbe bloccare il caricamento completo nella pagina principale per motivi di sicurezza.
    </div>

    <script>
        // Fallback in caso di blocco
        window.addEventListener('load', () => {
            const iframe = document.querySelector('iframe');
            setTimeout(() => {
                if (iframe.contentDocument === null) {
                    console.log("YouTube ha bloccato l'iframe");
                }
            }, 3000);
        });
    </script>
</body>
</html>
